name: Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "Which local action mode to exercise"
        required: true
        default: test
        type: choice
        options:
          - test
          - apply

permissions:
  contents: read
  id-token: write

concurrency:
  group: tailscale-acl-integration
  cancel-in-progress: false

env:
  TS_POLICY_FILE: test/fixtures/policy.hujson

jobs:
  oidc:
    name: OIDC ${{ github.event_name == 'push' && 'apply' || inputs.action || 'test' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build local action
        run: npm run build

      - name: Fetch version-cache.json
        uses: actions/cache@v5
        with:
          path: ./version-cache.json
          key: version-cache.json-oidc-${{ github.run_id }}
          restore-keys: |
            version-cache.json-oidc-

      - name: Test ACL with OIDC
        if: |
          (
            github.event_name == 'pull_request' ||
            (github.event_name == 'workflow_dispatch' && inputs.action == 'test')
          )
        uses: ./
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tailnet: ${{ secrets.TS_TAILNET }}
          policy-file: ${{ env.TS_POLICY_FILE }}
          action: test

      - name: Apply ACL with OIDC
        if: |
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
          )
        uses: ./
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tailnet: ${{ secrets.TS_TAILNET }}
          policy-file: ${{ env.TS_POLICY_FILE }}
          action: apply

  oauth-credentials:
    name: OAuth credentials test
    runs-on: ubuntu-latest
    needs: oidc
    if: ${{ always() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build local action
        run: npm run build

      - name: Test ACL with OAuth credentials
        uses: ./
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          policy-file: ${{ env.TS_POLICY_FILE }}
          action: test
