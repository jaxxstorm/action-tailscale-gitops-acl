name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check generated dist
        run: git diff --exit-code dist/index.js dist/index.js.map dist/package.json dist/sourcemap-register.cjs

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
