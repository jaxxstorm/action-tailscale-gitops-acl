name: Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check Go ETag compatibility
        run: npm test -- --run src/hujson/index.test.ts

      - name: Build
        run: npm run build

      - name: Check generated dist
        run: git diff --exit-code dist/index.js
