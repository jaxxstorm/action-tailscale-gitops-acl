name: "Action Tailscale GitOps ACL"
description: "Push changes to Tailscale and run ACL tests in CI"
inputs:
  tailnet:
    description: "Tailnet name (eg. example.com, xe.github, tailscale.org.github)"
    required: true
  api-key:
    description: "Tailscale API key"
    required: false
  oauth-client-id:
    description: "Tailscale OAuth or OIDC Federated Identity Client ID"
    required: false
  oauth-secret:
    description: "Tailscale OAuth Secret"
    required: false
  audience:
    description: "Tailscale OIDC Federated Identity Audience"
    required: false
  policy-file:
    description: "Path to policy file"
    required: true
    default: ./policy.hujson
  action:
    description: "Action to take (test/apply)"
    required: true
runs:
  using: "node24"
  main: "dist/index.js"
